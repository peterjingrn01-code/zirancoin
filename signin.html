<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Account</title><link rel="stylesheet" href="style.css"></head><body><main class="wrap"><section class="panel"><h2>Sign In to Ziran2</h2><div id="msg" class="notice">Enter your registered email. A six-digit code will be sent by Resend.</div><form id="send"><label>Email</label><input id="email" type="email" required><div class="actions"><button class="btn gold">Send Code</button></div></form><form id="verify" class="hidden"><label>Verification code</label><input id="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required><div class="actions"><button class="btn gold">Verify & Sign In</button></div></form></section></main><script src="app.js"></script><script>
const send=document.querySelector('#send'),verify=document.querySelector('#verify');
send.onsubmit=async e=>{e.preventDefault();try{await api('/api/auth/send-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({intent:'signin',email:email.value})});setNotice(msg,'Verification code sent.','ok');send.classList.add('hidden');verify.classList.remove('hidden')}catch(x){setNotice(msg,x.message,'error')}};
verify.onsubmit=async e=>{e.preventDefault();try{const r=await api('/api/auth/verify-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value,code:code.value})});localStorage.setItem('ziran_token',r.token);location.href='dashboard.html'}catch(x){setNotice(msg,x.message,'error')}};
</script></body></html>
