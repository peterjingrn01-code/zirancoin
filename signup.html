<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Sign Up</title><link rel='stylesheet' href='style.css'></head><body><header><div class='wrap nav'><a class='brand' href='index.html'>ZIRAN2</a><nav class='links'><a href='index.html'>Home</a><a href='whitepaper.html'>White Paper</a><a href='explorer.html'>Explorer</a><a href='dashboard.html'>Account</a><a href='https://www.jsl-ian.com'>JSL-ian</a><a class='btn' href='signin.html'>Sign In</a><a class='btn gold' href='signup.html'>Sign Up</a></nav></div></header><main class='wrap'><section class='panel'><h2>Create Account</h2><div id='msg' class='notice'>Create your Ziran2 user and Pair identity.</div><form id='f'><label>Name</label><input id='name' required><label>Email</label><input id='email' type='email' required><label>Password</label><input id='password' type='password' minlength='10' required><div class='actions'><button class='btn gold'>Create</button></div></form></section></main><footer><div class='wrap'>© 2026 JSL-ian Technologies LTD. All Rights Reserved. · JSL-ian™ is a trademark of JSL-ian Technologies LTD.</div></footer><script src='app.js'></script><script>$('#f').onsubmit=async e=>{e.preventDefault();try{const r=await api('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:$('#name').value,email:$('#email').value,password:$('#password').value})});localStorage.setItem('ziran_token',r.token);location.href='dashboard.html'}catch(x){note(x.message,'error')}}</script></body></html>
