<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Create Ziran2 Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header><div class="wrap nav">
  <a class="brand" href="index.html">ZIRAN2</a>
  <nav class="links">
    <a href="index.html">Home</a><a href="whitepaper.html">White Paper</a>
    <a href="explorer.html">Explorer</a><a href="dashboard.html">Account</a>
    <a href="https://www.jsl-ian.com">JSL-ian</a>
    <a class="btn" href="signin.html">Sign In</a>
  </nav>
</div></header>
<main class="wrap"><section class="panel">
  <h2>Create Ziran2 Account</h2>
  <div id="msg" class="notice">Enter your name and email. Resend will send a six-digit code.</div>
  <form id="sendForm">
    <label for="name">Name</label><input id="name" required maxlength="80" autocomplete="name">
    <label for="email">Email</label><input id="email" type="email" required maxlength="160" autocomplete="email">
    <div class="actions"><button class="btn gold" type="submit">Send Code</button></div>
  </form>
  <form id="verifyForm" class="hidden">
    <label for="code">Verification code</label>
    <input id="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>
    <div class="actions">
      <button class="btn gold" type="submit">Verify &amp; Create</button>
      <button class="btn" id="restart" type="button">Use another email</button>
    </div>
  </form>
</section></main>
<footer><div class="wrap">© 2026 JSL-ian Technologies LTD. All Rights Reserved. · JSL-ian™ is a trademark of JSL-ian Technologies LTD.</div></footer>
<script src="app.js"></script>
<script>
const msgEl = document.querySelector('#msg');
const sendForm = document.querySelector('#sendForm');
const verifyForm = document.querySelector('#verifyForm');
const nameInput = document.querySelector('#name');
const emailInput = document.querySelector('#email');
const codeInput = document.querySelector('#code');

sendForm.addEventListener('submit', async (event) => {
  event.preventDefault();
  try {
    await api('/api/auth/send-code', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({intent:'signup', name:nameInput.value, email:emailInput.value})
    });
    setNotice(msgEl, 'Verification code sent. Check your email.', 'ok');
    sendForm.classList.add('hidden');
    verifyForm.classList.remove('hidden');
    codeInput.focus();
  } catch (error) { setNotice(msgEl, error.message, 'error'); }
});

verifyForm.addEventListener('submit', async (event) => {
  event.preventDefault();
  try {
    const result = await api('/api/auth/verify-code', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email:emailInput.value, code:codeInput.value})
    });
    localStorage.setItem('ziran_token', result.token);
    location.href = 'dashboard.html';
  } catch (error) { setNotice(msgEl, error.message, 'error'); }
});

document.querySelector('#restart').addEventListener('click', () => {
  verifyForm.classList.add('hidden');
  sendForm.classList.remove('hidden');
  codeInput.value = '';
});
</script>
</body></html>
