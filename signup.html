<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Ziran2 Account</title>
<link rel="stylesheet" href="style.css">
<style>.hidden{display:none!important}</style>
</head>
<body>
<header><div class="wrap nav">
<a class="brand" href="index.html">ZIRAN2</a>
<nav class="links">
<a href="index.html">Home</a>
<a href="whitepaper.html">White Paper</a>
<a href="explorer.html">Explorer</a>
<a href="dashboard.html">Account</a>
<a href="https://www.jsl-ian.com">JSL-ian</a>
<a class="btn" href="signin.html">Sign In</a>
</nav></div></header>

<main class="wrap"><section class="panel">
<h2>Create Ziran2 Account</h2>
<div id="msg" class="notice">Enter your name and email. Resend will send a six-digit code.</div>

<form id="sendForm">
<label for="signupName">Name</label>
<input id="signupName" required maxlength="80">
<label for="signupEmail">Email</label>
<input id="signupEmail" type="email" required maxlength="160">
<div class="actions"><button id="sendButton" class="btn gold" type="submit">Send Code</button></div>
</form>

<form id="verifyForm" class="hidden">
<label for="verifyCode">Verification code</label>
<input id="verifyCode" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required>
<div class="actions">
<button id="verifyButton" class="btn gold" type="submit">Verify &amp; Create</button>
<button id="restartButton" class="btn" type="button">Use another email</button>
</div>
</form>
</section></main>

<footer><div class="wrap">© 2026 JSL-ian Technologies LTD. All Rights Reserved. · JSL-ian™ is a trademark of JSL-ian Technologies LTD.</div></footer>

<script src="app.js"></script>
<script>
(() => {
  const messageBox = document.querySelector("#msg");
  const sendForm = document.querySelector("#sendForm");
  const verifyForm = document.querySelector("#verifyForm");
  const nameInput = document.querySelector("#signupName");
  const emailInput = document.querySelector("#signupEmail");
  const codeInput = document.querySelector("#verifyCode");
  const sendButton = document.querySelector("#sendButton");
  const verifyButton = document.querySelector("#verifyButton");
  const restartButton = document.querySelector("#restartButton");

  function showMessage(text, type = "") {
    messageBox.className = "notice" + (type ? " " + type : "");
    messageBox.textContent = text;
  }

  function setBusy(button, busy, normalText, busyText) {
    button.disabled = busy;
    button.textContent = busy ? busyText : normalText;
  }

  sendForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    setBusy(sendButton, true, "Send Code", "Sending...");
    try {
      await api("/api/auth/send-code", {
        method: "POST",
        body: JSON.stringify({
          intent: "signup",
          name: nameInput.value.trim(),
          email: emailInput.value.trim()
        })
      });
      showMessage("Verification code sent. Check your email.", "ok");
      sendForm.classList.add("hidden");
      verifyForm.classList.remove("hidden");
      codeInput.focus();
    } catch (error) {
      showMessage(error.message || "Unable to send verification code.", "error");
    } finally {
      setBusy(sendButton, false, "Send Code", "Sending...");
    }
  });

  verifyForm.addEventListener("submit", async (event) => {
    event.preventDefault();
    const codeValue = codeInput.value.trim();
    if (!/^\d{6}$/.test(codeValue)) {
      showMessage("Enter the six-digit verification code.", "error");
      return;
    }
    setBusy(verifyButton, true, "Verify & Create", "Verifying...");
    try {
      const result = await api("/api/auth/verify-code", {
        method: "POST",
        body: JSON.stringify({
          email: emailInput.value.trim(),
          code: codeValue
        })
      });
      if (!result || !result.token) throw new Error("No session token returned.");
      localStorage.setItem("ziran_token", result.token);
      showMessage("Account created successfully. Opening dashboard...", "ok");
      window.location.assign("dashboard.html");
    } catch (error) {
      showMessage(error.message || "Verification failed.", "error");
      setBusy(verifyButton, false, "Verify & Create", "Verifying...");
    }
  });

  restartButton.addEventListener("click", () => {
    codeInput.value = "";
    verifyForm.classList.add("hidden");
    sendForm.classList.remove("hidden");
    showMessage("Enter your name and email. Resend will send a six-digit code.");
  });
})();
</script>
</body>
</html>
