<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Explorer</title><link rel='stylesheet' href='style.css'></head><body><header><div class='wrap nav'><a class='brand' href='index.html'>ZIRAN2</a><nav class='links'><a href='index.html'>Home</a><a href='whitepaper.html'>White Paper</a><a href='explorer.html'>Explorer</a><a href='dashboard.html'>Account</a><a href='https://www.jsl-ian.com'>JSL-ian</a><a class='btn' href='signin.html'>Sign In</a><a class='btn gold' href='signup.html'>Sign Up</a></nav></div></header><main class='wrap'><section><h1 style='font-size:44px;color:#ffd36a'>Explorer</h1><div class='stats'><div class='stat'>Supply<b id='supply'>—</b></div><div class='stat'>Circulating<b id='circulating'>—</b></div><div class='stat'>Accounts<b id='accounts'>—</b></div><div class='stat'>Transfers<b id='transfers'>—</b></div></div><div style='overflow:auto'><table><thead><tr><th>Date</th><th>Transaction</th><th>From</th><th>To</th><th>Amount</th><th>Pair Proof</th></tr></thead><tbody id='rows'></tbody></table></div></section></main><footer><div class='wrap'>© 2026 JSL-ian Technologies LTD. All Rights Reserved. · JSL-ian™ is a trademark of JSL-ian Technologies LTD.</div></footer><script src='app.js'></script><script>(async()=>{try{const d=await api('/api/explorer');$('#supply').textContent=money(d.supply);$('#circulating').textContent=money(d.circulating);$('#accounts').textContent=d.accounts;$('#transfers').textContent=d.transfers;$('#rows').innerHTML=d.latest.map(x=>`<tr><td>${new Date(x.created_at).toLocaleString()}</td><td>${x.tx_id.slice(0,14)}…</td><td>${x.from_public_id||'GENESIS'}</td><td>${x.to_public_id}</td><td>${money(x.amount)}</td><td>${x.pair_proof.slice(0,14)}…</td></tr>`).join('')||'<tr><td colspan=6>No transactions</td></tr>'}catch(x){document.querySelector('main').textContent=x.message}})()</script></body></html>
